name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry, build, and tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/wasm-bindgen
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Install wasm-bindgen-cli
        run: |
          if ! command -v wasm-bindgen &>/dev/null; then
            cargo install wasm-bindgen-cli --locked
          fi

      - name: Build WASM
        run: cargo build --profile wasm-release --target wasm32-unknown-unknown

      - name: Run wasm-bindgen
        run: |
          BIN_NAME=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import json,sys; \
              pkgs=json.load(sys.stdin)['packages']; \
              bins=[t['name'] for p in pkgs for t in p['targets'] if 'bin' in t['kind']]; \
              print(bins[0])")
          wasm-bindgen \
            --out-dir web/out \
            --target web \
            "target/wasm32-unknown-unknown/wasm-release/${BIN_NAME}.wasm"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
