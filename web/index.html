<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breakneck Baseball</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
            z-index: 10;
            background: #1a1a2e;
        }

        #loading h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        #loading p {
            font-size: 1rem;
            opacity: 0.7;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #e0e0e0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <h1>Breakneck Baseball</h1>
        <p>Loading…</p>
    </div>

    <script type="module">
        import init from './out/breakneck-baseball.js';

        async function run() {
            await init();
            // Bevy creates its own canvas — hide the loading overlay once it starts.
            document.getElementById('loading').style.display = 'none';
        }

        run().catch((error) => {
            const el = document.getElementById('loading');
            el.querySelector('p').textContent =
                'Failed to start: ' + error.message;
            el.querySelector('.spinner').style.display = 'none';
            console.error(error);
        });
    </script>
</body>
</html>
